name: Build and release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runs-on: ubuntu-24.04
            archive: tar.gz
          - target: linux-arm64
            runs-on: ubuntu-24.04-arm
            archive: tar.gz
          - target: windows-amd64
            runs-on: windows-latest
            archive: zip
          - target: darwin-arm64
            runs-on: macos-14
            archive: tar.gz
          - target: darwin-amd64
            runs-on: macos-13
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and build
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"
          bash scripts/build_agent.sh

      - name: Smoke test binary
        shell: bash
        run: |
          DIST="dist/gxra-agent-${{ matrix.target }}"
          if [[ -f "$DIST/gxra-agent.exe" ]]; then
            "$DIST/gxra-agent.exe" info
          else
            "$DIST/gxra-agent" info
          fi

      - name: Package artifact
        shell: bash
        run: |
          DIST="dist/gxra-agent-${{ matrix.target }}"
          PKG="dist/gxra-agent-${{ matrix.target }}.${{ matrix.archive }}"
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd "$DIST" && zip -r "../gxra-agent-${{ matrix.target }}.zip" .)
          else
            tar -czf "$PKG" -C "$DIST" .
          fi
          ls -la dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: gxra-agent-${{ matrix.target }}
          path: dist/gxra-agent-${{ matrix.target }}.*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
